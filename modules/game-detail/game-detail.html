<div id="game-detail-container" class="max-w-7xl mx-auto px-4 py-8">
    <!-- Loading state -->
    <div id="game-loading" class="text-center py-16">
        <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-cyan-500"></div>
        <p class="text-gray-400 mt-4">Loading game details...</p>
    </div>
    
    <!-- Game content (hidden initially) -->
    <div id="game-content" class="hidden space-y-8">
        <div id="game-header" class="bg-gray-800 rounded-xl p-6 border border-cyan-500/30"></div>
        <div id="recent-players-section" class="bg-gray-800 rounded-xl p-6 border border-gray-700"></div>
        <div id="achievements-section" class="bg-gray-800 rounded-xl p-6 border border-gray-700"></div>
        <div id="comments-section" class="bg-gray-800 rounded-xl p-6 border border-gray-700"></div>
    </div>
    
    <!-- Error state -->
    <div id="game-error" class="hidden text-center py-16">
        <div class="text-5xl mb-4">❌</div>
        <h3 class="text-2xl font-bold text-red-400 mb-2">Game Not Found</h3>
        <p class="text-gray-300 mb-6">The game you're looking for doesn't exist or has been removed.</p>
        <button onclick="window.location.hash = '#/games'" class="bg-cyan-600 hover:bg-cyan-700 text-white px-6 py-3 rounded-lg">Browse Games</button>
    </div>
</div>

<style>
    .game-screenshot { transition: transform 0.3s; }
    .game-screenshot:hover { transform: scale(1.02); }
    .comment-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, #06b6d4, #8b5cf6); }
    .comment-box { transition: all 0.2s; }
    .comment-box:hover { background-color: rgba(55, 65, 81, 0.3); }
    .achievement-badge { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; background-color: #1f2937; }
    .memory-logic { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 0.75rem; background: #111827; padding: 0.5rem; border-radius: 0.375rem; overflow-x: auto; color: #4ade80; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
</style>
