<div class="max-w-5xl mx-auto p-4 animate-fade-in">
  <!-- Header -->
  <div class="mb-8 flex items-center gap-4">
    <button onclick="window.history.back()" class="p-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-gray-300 transition">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
    </button>
    <div>
      <h1 id="discuss-game-title" class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-cyan-400">Loading...</h1>
      <p class="text-gray-400 text-sm">Community Discussions & Mods</p>
    </div>
  </div>

  <!-- Category Tabs -->
  <div class="flex gap-2 mb-6 overflow-x-auto pb-2">
    <button class="cat-tab active px-4 py-2 bg-purple-600 text-white rounded-full text-sm font-bold whitespace-nowrap" data-cat="all">All Posts</button>
    <button class="cat-tab px-4 py-2 bg-gray-800 hover:bg-gray-700 text-gray-300 rounded-full text-sm font-bold whitespace-nowrap" data-cat="mods">Mods</button>
    <button class="cat-tab px-4 py-2 bg-gray-800 hover:bg-gray-700 text-gray-300 rounded-full text-sm font-bold whitespace-nowrap" data-cat="textures">Texture Packs</button>
    <button class="cat-tab px-4 py-2 bg-gray-800 hover:bg-gray-700 text-gray-300 rounded-full text-sm font-bold whitespace-nowrap" data-cat="lfg">Looking for Group</button>
    <button class="cat-tab px-4 py-2 bg-gray-800 hover:bg-gray-700 text-gray-300 rounded-full text-sm font-bold whitespace-nowrap" data-cat="bugs">Bugs & Glitches</button>
  </div>

  <!-- New Post Button -->
  <div class="mb-6 flex justify-end">
    <button id="btn-new-post" class="bg-cyan-600 hover:bg-cyan-500 text-white px-6 py-2 rounded-lg font-bold shadow-lg flex items-center gap-2 transition">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
      New Discussion
    </button>
  </div>

  <!-- Posts List -->
  <div id="discussions-list" class="space-y-4">
    <div class="text-center py-10 text-gray-500">
      <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-purple-500"></div>
      <p class="mt-2">Loading discussions...</p>
    </div>
  </div>
</div>

<!-- New Post Modal (Hidden by default) -->
<div id="new-post-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
  <div class="bg-gray-800 border border-gray-700 rounded-xl max-w-2xl w-full p-6 shadow-2xl">
    <h2 class="text-2xl font-bold text-white mb-4">Start New Discussion</h2>
    <form id="new-post-form">
      <input type="text" id="post-title" placeholder="Topic Title (e.g., 'Best HD Texture Pack?')" class="w-full bg-gray-900 border border-gray-600 rounded-lg p-3 text-white mb-4 focus:border-purple-500 focus:outline-none" required>
      
      <select id="post-category" class="w-full bg-gray-900 border border-gray-600 rounded-lg p-3 text-white mb-4 focus:border-purple-500 focus:outline-none">
        <option value="general">General Discussion</option>
        <option value="mods">Mods</option>
        <option value="textures">Texture Packs</option>
        <option value="lfg">Looking for Group</option>
        <option value="bugs">Bugs & Glitches</option>
      </select>

      <textarea id="post-content" rows="6" placeholder="Share your details, links, or questions..." class="w-full bg-gray-900 border border-gray-600 rounded-lg p-3 text-white mb-4 focus:border-purple-500 focus:outline-none" required></textarea>

      <div class="flex justify-end gap-3">
        <button type="button" id="cancel-post" class="px-4 py-2 text-gray-400 hover:text-white transition">Cancel</button>
        <button type="submit" class="px-6 py-2 bg-purple-600 hover:bg-purple-500 text-white rounded-lg font-bold transition">Post Discussion</button>
      </div>
    </form>
  </div>
</div>
