<div class="max-w-6xl mx-auto p-4 h-[calc(100vh-80px)] flex gap-4 animate-fade-in">
  
  <!-- Left Sidebar: Contact List -->
  <div class="w-1/3 bg-gray-800 rounded-xl border border-gray-700 flex flex-col overflow-hidden shadow-2xl">
    <div class="p-4 border-b border-gray-700 bg-gray-900 flex justify-between items-center">
      <h2 class="text-xl font-bold text-white flex items-center gap-2">
        💬 Direct Messages
      </h2>
      <button id="btn-new-dm" class="bg-cyan-600 hover:bg-cyan-500 text-white px-3 py-1.5 rounded-lg text-xs font-bold transition shadow-lg flex items-center gap-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        New
      </button>
    </div>
    
    <div id="dm-contact-list" class="flex-1 overflow-y-auto custom-scrollbar bg-gray-800/50">
      <div class="p-4 text-center text-gray-500 text-sm">
        <div class="inline-block animate-spin rounded-full h-4 w-4 border-t-2 border-b-2 border-cyan-500 mb-2"></div>
        <p>Loading conversations...</p>
      </div>
    </div>
  </div>

  <!-- Right Panel: Chat Window -->
  <div class="w-2/3 bg-gray-800 rounded-xl border border-gray-700 flex flex-col overflow-hidden relative shadow-2xl">
    
    <!-- Empty State (Visible when no chat selected) -->
    <div id="dm-empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-gray-500 bg-gray-800 z-10">
      <div class="text-6xl mb-4">💬</div>
      <h3 class="text-xl font-bold text-white mb-2">Your Messages</h3>
      <p class="text-sm max-w-xs text-center">Select a conversation from the list or start a new one to begin messaging.</p>
    </div>

    <!-- Chat Header (Hidden by default) -->
    <div id="dm-chat-header" class="hidden p-4 border-b border-gray-700 bg-gray-900 flex items-center gap-3 shadow-md">
      <img id="dm-header-avatar" src="" class="w-10 h-10 rounded-full border-2 border-cyan-500 object-cover">
      <div class="flex-1">
        <h3 id="dm-header-name" class="font-bold text-white text-lg"></h3>
        <span class="text-xs text-green-400 flex items-center gap-1">
          <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Online
        </span>
      </div>
    </div>

    <!-- Messages Area (Hidden by default) -->
    <div id="dm-messages-container" class="hidden flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar bg-gray-900/50 scroll-smooth">
      <!-- Messages injected here by JS -->
    </div>

    <!-- Input Area (Hidden by default) -->
    <div id="dm-input-area" class="hidden p-4 border-t border-gray-700 bg-gray-900">
      <form id="dm-send-form" class="flex gap-2">
        <input type="text" id="dm-message-input" 
               placeholder="Type a message..." 
               class="flex-1 bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-white focus:border-cyan-500 focus:outline-none focus:ring-1 focus:ring-cyan-500 transition"
               autocomplete="off">
        <button type="submit" class="bg-cyan-600 hover:bg-cyan-500 text-white px-6 py-2 rounded-lg font-bold transition shadow-lg transform active:scale-95">
          Send
        </button>
      </form>
    </div>
  </div>
</div>

<!-- NEW MESSAGE MODAL (This was missing!) -->
<div id="new-dm-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
  <div class="bg-gray-800 border border-gray-700 rounded-xl max-w-md w-full p-6 shadow-2xl transform transition-all scale-100">
    <h2 class="text-2xl font-bold text-white mb-4 flex items-center gap-2">
      <span>✨</span> Start New Conversation
    </h2>
    
    <form id="new-dm-form">
      <label class="block text-sm font-bold text-gray-300 mb-2">Username</label>
      <input type="text" id="new-dm-username" 
             placeholder="e.g. RetroGamer99" 
             class="w-full bg-gray-900 border border-gray-600 rounded-lg p-3 text-white mb-4 focus:border-cyan-500 focus:outline-none focus:ring-1 focus:ring-cyan-500 transition" 
             required>
      
      <div class="flex justify-end gap-3 mt-6">
        <button type="button" id="cancel-new-dm" class="px-4 py-2 text-gray-400 hover:text-white transition font-medium">Cancel</button>
        <button type="submit" class="px-6 py-2 bg-cyan-600 hover:bg-cyan-500 text-white rounded-lg font-bold transition shadow-lg">
          Start Chat
        </button>
      </div>
    </form>
  </div>
</div>
