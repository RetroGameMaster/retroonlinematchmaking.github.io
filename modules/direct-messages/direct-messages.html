<div class="max-w-7xl mx-auto p-4 h-[calc(100vh-80px)] flex gap-4">
  
  <!-- Left Sidebar: Contact List -->
  <div class="w-1/3 bg-gray-800 rounded-xl border border-gray-700 flex flex-col overflow-hidden">
    <div class="p-4 border-b border-gray-700 bg-gray-900">
      <h2 class="text-xl font-bold text-white flex items-center gap-2">
        💬 Direct Messages
      </h2>
      <p class="text-xs text-gray-400 mt-1">Select a user to start chatting</p>
    </div>
    
    <div id="dm-contact-list" class="flex-1 overflow-y-auto custom-scrollbar">
      <div class="p-4 text-center text-gray-500 text-sm">
        <div class="inline-block animate-spin rounded-full h-4 w-4 border-t-2 border-b-2 border-cyan-500 mb-2"></div>
        <p>Loading conversations...</p>
      </div>
    </div>
  </div>

  <!-- Right Panel: Chat Window -->
  <div class="w-2/3 bg-gray-800 rounded-xl border border-gray-700 flex flex-col overflow-hidden relative">
    
    <!-- Empty State -->
    <div id="dm-empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-gray-500 bg-gray-800/90 z-10">
      <div class="text-6xl mb-4">👋</div>
      <h3 class="text-xl font-bold text-white mb-2">No Conversation Selected</h3>
      <p class="text-sm">Choose a user from the list to view your chat history.</p>
    </div>

    <!-- Chat Header -->
    <div id="dm-chat-header" class="hidden p-4 border-b border-gray-700 bg-gray-900 flex items-center gap-3">
      <img id="dm-header-avatar" src="" class="w-10 h-10 rounded-full border border-cyan-500 object-cover">
      <div>
        <h3 id="dm-header-name" class="font-bold text-white"></h3>
        <span class="text-xs text-green-400 flex items-center gap-1">
          <span class="w-2 h-2 bg-green-500 rounded-full"></span> Online
        </span>
      </div>
    </div>

    <!-- Messages Area -->
    <div id="dm-messages-container" class="hidden flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar bg-gray-900/50">
      <!-- Messages injected here -->
    </div>

    <!-- Input Area -->
    <div id="dm-input-area" class="hidden p-4 border-t border-gray-700 bg-gray-900">
      <form id="dm-send-form" class="flex gap-2">
        <input type="text" id="dm-message-input" 
               placeholder="Type a message..." 
               class="flex-1 bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-white focus:border-cyan-500 focus:outline-none"
               autocomplete="off">
        <button type="submit" class="bg-cyan-600 hover:bg-cyan-500 text-white px-6 py-2 rounded-lg font-bold transition">
          Send
        </button>
      </form>
    </div>
  </div>
</div>
