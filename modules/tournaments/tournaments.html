<div class="max-w-6xl mx-auto p-4">
    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-4xl font-bold text-white mb-2">🏆 Tournament Hub</h1>
            <p class="text-gray-400">Community hosted events. Register via external links.</p>
        </div>
        <button id="btn-new-tourney" class="bg-purple-600 hover:bg-purple-500 text-white px-6 py-3 rounded-lg font-bold shadow-lg transition flex items-center gap-2">
            <span>➕</span> Host Tournament
        </button>
    </div>

    <!-- Upcoming Events List -->
    <div id="tourney-list" class="space-y-4">
        <div class="text-center py-12 text-gray-500">Loading tournaments...</div>
    </div>
</div>

<!-- Modal -->
<div id="tourney-modal" class="hidden fixed inset-0 z-50 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-gray-800 rounded-xl border border-gray-600 w-full max-w-lg p-6 relative">
        <button id="close-tourney-modal" class="absolute top-4 right-4 text-gray-400 hover:text-white">✕</button>
        <h2 class="text-2xl font-bold text-white mb-4">🏆 Host a Tournament</h2>
        <form id="tourney-form" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-300 mb-1">Tournament Name *</label>
                <input type="text" id="t-title" required class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white">
            </div>
            <div>
                <label class="block text-sm text-gray-300 mb-1">Game *</label>
                <input type="text" id="t-game" list="t-game-list" required class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white">
                <datalist id="t-game-list"></datalist>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-gray-300 mb-1">Start Date *</label>
                    <input type="datetime-local" id="t-date" required class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white">
                </div>
                <div>
                    <label class="block text-sm text-gray-300 mb-1">Prize Pool</label>
                    <input type="text" id="t-prize" placeholder="e.g. $50 PayPal or Free" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white">
                </div>
            </div>
            <div>
                <label class="block text-sm text-gray-300 mb-1">Description / Rules</label>
                <textarea id="t-desc" rows="3" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white"></textarea>
            </div>
            <div>
                <label class="block text-sm text-gray-300 mb-1">Registration Link (Discord/Challonge/Start.gg) *</label>
                <input type="url" id="t-link" required placeholder="https://..." class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white">
                <p class="text-xs text-gray-500 mt-1">Users will be redirected here to sign up.</p>
            </div>
            <button type="submit" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 rounded-lg">Create Event</button>
        </form>
    </div>
</div>
