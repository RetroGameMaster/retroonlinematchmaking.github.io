<!-- modules/articles/article.html -->
<div class="max-w-4xl mx-auto p-4 animate-fade-in">
  
  <!-- Back Button -->
  <a href="#/articles" class="inline-flex items-center gap-2 text-gray-400 hover:text-cyan-400 mb-6 transition">
    <span>←</span> Back to Articles
  </a>

  <!-- Loading State -->
  <div id="article-loading" class="text-center py-20">
    <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-purple-500"></div>
    <p class="text-gray-400 mt-4">Loading story...</p>
  </div>

  <!-- Content Container (Hidden by default) -->
  <div id="article-content" class="hidden">
    
    <!-- Header Section -->
    <header class="mb-8">
      <div class="flex items-center gap-3 mb-4">
        <span id="article-category-badge" class="px-3 py-1 rounded-full text-xs font-bold bg-purple-900 text-purple-300 border border-purple-700">
          Category
        </span>
        <span id="article-date" class="text-sm text-gray-500"></span>
      </div>
      
      <h1 id="article-title" class="text-4xl md:text-5xl font-bold text-white mb-6 leading-tight drop-shadow-lg"></h1>

      <!-- Author Gamercard Slot -->
      <div id="author-gamercard-slot" class="mb-8"></div>
    </header>

    <!-- Main Content -->
    <article id="article-body" class="prose prose-invert prose-lg max-w-none bg-gray-800/30 p-8 rounded-xl border border-gray-700 shadow-xl">
      <!-- Content injected via JS -->
    </article>

    <!-- Interaction Bar -->
    <div class="mt-8 bg-gray-800/50 backdrop-blur rounded-xl border border-gray-700 p-4">
      
      <!-- Reactions -->
      <div class="mb-6">
        <h3 class="text-sm font-bold text-gray-400 uppercase mb-3">Reactions</h3>
        
        <!-- Reaction Buttons -->
        <div class="flex flex-wrap gap-2 mb-4" id="reaction-buttons">
          <!-- Injected via JS -->
        </div>

        <!-- Reaction Counts -->
        <div class="flex gap-4 text-sm text-gray-400" id="reaction-counts">
          <!-- Injected via JS -->
        </div>
      </div>

      <!-- Comment Input -->
      <div class="border-t border-gray-700 pt-4">
        <h3 class="text-sm font-bold text-gray-400 uppercase mb-3">Comments</h3>
        <div class="flex gap-2">
          <input type="text" id="comment-input" placeholder="Share your thoughts..." class="flex-1 bg-gray-900 border border-gray-600 rounded-lg px-4 py-2 text-white focus:border-purple-500 focus:outline-none">
          <button id="btn-post-comment" class="bg-purple-600 hover:bg-purple-500 text-white px-6 py-2 rounded-lg font-bold transition">Post</button>
        </div>
      </div>

      <!-- Comments List -->
      <div id="comments-list" class="mt-6 space-y-4">
        <!-- Comments injected via JS -->
      </div>

    </div>
  </div>
</div>
