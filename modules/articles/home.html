<!-- modules/articles/home.html -->
<div class="max-w-7xl mx-auto p-4 animate-fade-in">
  
  <!-- Header & Stats -->
  <div class="flex flex-col md:flex-row justify-between items-end mb-8 gap-4 border-b border-gray-800 pb-6">
    <div>
      <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-400 mb-2">
        📚 ROM Writers Guild
      </h1>
      <p class="text-gray-400">Community stories, guides, and the official magazine.</p>
    </div>
    <button id="btn-write-new" class="bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-bold py-2 px-6 rounded-lg shadow-lg transform hover:scale-105 transition flex items-center gap-2">
      <span>✒️</span> Write Article
    </button>
  </div>

  <!-- 📰 MAGAZINE HERO SECTION (Shows latest issue only) -->
  <div id="magazine-hero" class="mb-12 hidden">
    <!-- Injected via JS -->
  </div>

  <!-- Filters -->
  <div class="flex flex-wrap gap-2 mb-8 sticky top-2 z-20 bg-gray-900/95 backdrop-blur p-2 rounded-xl border border-gray-800 shadow-xl">
    <button class="filter-btn active px-4 py-2 rounded-lg text-sm font-bold transition bg-purple-600 text-white" data-filter="all">All Articles</button>
    <button class="filter-btn px-4 py-2 rounded-lg text-sm font-bold transition bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white" data-filter="guides">📚 Guides</button>
    <button class="filter-btn px-4 py-2 rounded-lg text-sm font-bold transition bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white" data-filter="stories">📖 Stories</button>
    <button class="filter-btn px-4 py-2 rounded-lg text-sm font-bold transition bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white" data-filter="general">💬 General</button>
    <button class="filter-btn px-4 py-2 rounded-lg text-sm font-bold transition bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white" data-filter="magazine">📰 Magazine</button>
  </div>

  <!-- Grid -->
  <div id="articles-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <!-- Loading State -->
    <div class="col-span-full text-center py-20">
      <div class="inline-block animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-purple-500 mb-4"></div>
      <p class="text-gray-400">Loading articles...</p>
    </div>
  </div>

  <!-- Empty State -->
  <div id="empty-state" class="hidden text-center py-20">
    <div class="text-6xl mb-4">📜</div>
    <h3 class="text-2xl font-bold text-white mb-2">No articles found</h3>
    <p class="text-gray-400 mb-6">Be the first to write something in this category!</p>
  </div>

</div>
