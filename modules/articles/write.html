<!-- modules/articles/write.html -->
<div class="max-w-4xl mx-auto p-4 animate-fade-in">
  
  <!-- Header -->
  <div class="mb-8 text-center">
    <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-400 mb-2">
      ✒️ Write an Article
    </h1>
    <p class="text-gray-400">Share your knowledge, stories, or guides. Earn 50 XP and the Writer's Badge upon publishing!</p>
  </div>

  <!-- Editor Container -->
  <div class="bg-gray-800/50 backdrop-blur rounded-xl border border-gray-700 overflow-hidden shadow-2xl">
    
    <!-- Title Input -->
    <input 
      type="text" 
      id="article-title" 
      placeholder="Enter an engaging title..." 
      class="w-full bg-gray-900/50 text-white text-3xl font-bold p-6 border-b border-gray-700 focus:outline-none focus:bg-gray-900 transition placeholder-gray-600"
    >

    <!-- Category Select -->
    <div class="p-4 bg-gray-900/30 border-b border-gray-700 flex gap-4 items-center">
      <label class="text-gray-400 text-sm font-bold uppercase">Category:</label>
      <select id="article-category" class="bg-gray-800 text-white border border-gray-600 rounded px-3 py-1 focus:border-purple-500 focus:outline-none">
        <option value="" disabled selected>Select a category...</option>
        <option value="general">💬 General Discussion</option>
        <option value="guides">📚 Guides & Tutorials</option>
        <option value="stories">📖 Retro Stories</option>
        <option value="magazine">📰 Magazine Submission</option>
      </select>
      
      <!-- Magazine Toggle -->
      <label class="flex items-center gap-2 ml-auto cursor-pointer group">
        <input type="checkbox" id="is-magazine" class="hidden peer">
        <div class="w-10 h-6 bg-gray-700 rounded-full peer-checked:bg-purple-600 relative transition-colors">
          <div class="absolute top-1 left-1 w-4 h-4 bg-white rounded-full transition-transform peer-checked:translate-x-4"></div>
        </div>
        <span class="text-xs text-gray-400 group-hover:text-white transition">Submit for Magazine?</span>
      </label>
    </div>

    <!-- Toolbar -->
    <div class="flex flex-wrap gap-2 p-3 bg-gray-900 border-b border-gray-700" id="toolbar">
      <button data-action="bold" class="p-2 rounded hover:bg-gray-700 text-gray-300 hover:text-white" title="Bold"><b>B</b></button>
      <button data-action="italic" class="p-2 rounded hover:bg-gray-700 text-gray-300 hover:text-white" title="Italic"><i>I</i></button>
      <button data-action="underline" class="p-2 rounded hover:bg-gray-700 text-gray-300 hover:text-white" title="Underline"><u>U</u></button>
      <button data-action="heading" class="p-2 rounded hover:bg-gray-700 text-gray-300 hover:text-white" title="Heading">H1</button>
      <button data-action="bulletList" class="p-2 rounded hover:bg-gray-700 text-gray-300 hover:text-white" title="Bullet List">• List</button>
      <button data-action="orderedList" class="p-2 rounded hover:bg-gray-700 text-gray-300 hover:text-white" title="Numbered List">1. List</button>
      <button data-action="blockquote" class="p-2 rounded hover:bg-gray-700 text-gray-300 hover:text-white" title="Quote">❝</button>
      <button data-action="codeBlock" class="p-2 rounded hover:bg-gray-700 text-gray-300 hover:text-white" title="Code">&lt;/&gt;</button>
      
      <div class="w-px h-6 bg-gray-700 mx-2"></div>
      
      <button id="btn-upload-image" class="p-2 rounded hover:bg-gray-700 text-green-400 hover:text-green-300 flex items-center gap-1" title="Upload Image">
        📷 Image
      </button>
      <input type="file" id="image-input" accept="image/*" class="hidden">
    </div>

    <!-- CRITICAL: This div MUST be empty for Tiptap to work -->
    <div id="editor-content" class="prose prose-invert max-w-none p-6 min-h-[400px] focus:outline-none text-gray-300"></div>

    <!-- Footer / Publish -->
    <div class="p-4 bg-gray-900/80 border-t border-gray-700 flex justify-between items-center">
      <span id="save-status" class="text-xs text-gray-500"></span>
      <button id="btn-publish" class="bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-bold py-2 px-8 rounded-lg shadow-lg transform hover:scale-105 transition disabled:opacity-50 disabled:cursor-not-allowed">
        🚀 Publish Article (+50 XP)
      </button>
    </div>
  </div>
</div>

<!-- Load Tiptap Core & Extensions from CDN (Fixed URLs) -->
<script src="https://unpkg.com/@tiptap/core@2.0.3/dist/index.umd.js"></script>
<script src="https://unpkg.com/@tiptap/starter-kit@2.0.3/dist/index.umd.js"></script>
<script src="https://unpkg.com/@tiptap/extension-image@2.0.3/dist/index.umd.js"></script>
<script src="https://unpkg.com/@tiptap/extension-link@2.0.3/dist/index.umd.js"></script>
