<div class="max-w-7xl mx-auto p-4 animate-fade-in">
    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-3xl font-bold text-purple-400 glow">📚 Admin: Guide Manager</h1>
            <p class="text-gray-400">Create, edit, and approve community guides.</p>
        </div>
        <button id="btn-new-guide" class="bg-purple-600 hover:bg-purple-500 text-white px-6 py-3 rounded-lg font-bold shadow-lg transition transform hover:-translate-y-1">
            + Create New Guide
        </button>
    </div>

    <!-- Tabs -->
    <div class="flex gap-4 mb-6 border-b border-gray-700">
        <button class="tab-btn active pb-2 border-b-2 border-purple-500 text-purple-400 font-bold" data-tab="pending">Pending Approval</button>
        <button class="tab-btn pb-2 border-b-2 border-transparent text-gray-400 hover:text-white" data-tab="approved">Approved Guides</button>
        <button class="tab-btn pb-2 border-b-2 border-transparent text-gray-400 hover:text-white" data-tab="all">All Guides</button>
    </div>

    <!-- Grid -->
    <div id="guides-admin-grid" class="grid grid-cols-1 gap-4">
        <div class="text-center text-gray-500 py-12">Loading guides...</div>
    </div>
</div>

<!-- Editor Modal -->
<div id="guide-editor-modal" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 overflow-y-auto">
    <div class="bg-gray-900 border border-purple-500 rounded-xl max-w-4xl w-full p-6 my-8 relative shadow-[0_0_50px_rgba(168,85,247,0.3)]">
        <button id="close-editor" class="absolute top-4 right-4 text-gray-400 hover:text-white text-2xl">&times;</button>
        
        <h2 id="modal-title" class="text-2xl font-bold text-purple-400 mb-6">Create/Edit Guide</h2>
        
        <form id="admin-guide-form" class="space-y-4">
            <input type="hidden" id="edit-guide-id">
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Game</label>
                    <select id="a-game" required class="w-full bg-gray-800 border border-gray-600 rounded p-2 text-white focus:border-purple-500 outline-none">
                        <option value="">Select Game...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Difficulty</label>
                    <select id="a-diff" class="w-full bg-gray-800 border border-gray-600 rounded p-2 text-white focus:border-purple-500 outline-none">
                        <option value="Easy">Easy</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="Hard">Hard</option>
                        <option value="Expert">Expert</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-1">Title</label>
                <input type="text" id="a-title" required placeholder="e.g., Complete Setup Guide for SOCOM II" class="w-full bg-gray-800 border border-gray-600 rounded p-2 text-white focus:border-purple-500 outline-none">
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-1">YouTube Video URL (Optional)</label>
                <input type="text" id="a-video" placeholder="https://youtube.com/watch?v=..." class="w-full bg-gray-800 border border-gray-600 rounded p-2 text-white focus:border-purple-500 outline-none">
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-1">Content (HTML Allowed)</label>
                <div class="flex gap-2 mb-1">
                    <button type="button" onclick="document.execCommand('bold')" class="px-2 py-1 bg-gray-700 text-white text-xs rounded hover:bg-gray-600">B</button>
                    <button type="button" onclick="document.execCommand('italic')" class="px-2 py-1 bg-gray-700 text-white text-xs rounded hover:bg-gray-600">I</button>
                    <button type="button" onclick="document.execCommand('insertUnorderedList')" class="px-2 py-1 bg-gray-700 text-white text-xs rounded hover:bg-gray-600">• List</button>
                </div>
                <textarea id="a-content" rows="15" required class="w-full bg-gray-800 border border-gray-600 rounded p-2 text-white font-mono text-sm focus:border-purple-500 outline-none"></textarea>
                <p class="text-xs text-gray-500 mt-1">Tip: You can paste formatted text from Word/Google Docs directly here.</p>
            </div>

            <div class="flex items-center gap-2 pt-2">
                <input type="checkbox" id="a-approved" class="w-4 h-4 text-purple-600 rounded bg-gray-800 border-gray-600">
                <label for="a-approved" class="text-sm text-green-400 font-bold">Publish Immediately (Approved)</label>
            </div>

            <div class="flex justify-end gap-3 pt-4 border-t border-gray-700">
                <button type="button" id="cancel-edit" class="px-4 py-2 text-gray-400 hover:text-white">Cancel</button>
                <button type="submit" class="bg-purple-600 hover:bg-purple-500 text-white px-6 py-2 rounded font-bold shadow-lg">Save Guide</button>
            </div>
        </form>
    </div>
</div>
